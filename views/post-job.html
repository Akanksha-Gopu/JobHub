<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobHub - Publish Job</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="../assets/css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navigation Header -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm py-3 mb-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="jobs.html">
                <i class="fa-solid fa-briefcase text-warning me-2 animate-bounce"></i>
                <span class="fw-bold tracking-wide">JobHub</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText" aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarText">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link fw-medium" href="jobs.html">Browse Jobs</a></li>
                    <li class="nav-item"><a class="nav-link fw-medium" href="dashboard-employer.html">My Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active fw-medium" href="post-job.html" id="form-nav-link">Post a Job</a></li>
                </ul>
                <div class="d-flex align-items-center">
                    <span class="text-white-50 me-3">Welcome, <strong class="text-white" id="user-name-display">Employer</strong></span>
                    <button id="logout-btn" class="btn btn-outline-light btn-sm fw-semibold"><i class="fa-solid fa-right-from-bracket me-1"></i> Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                
                <!-- Back Link -->
                <a href="dashboard-employer.html" class="btn btn-link text-decoration-none text-secondary mb-3 ps-0">
                    <i class="fa-solid fa-arrow-left me-1"></i> Back to Dashboard
                </a>

                <!-- Header Title -->
                <h4 id="form-title" class="fw-bold text-dark mb-4"><i class="fa-solid fa-file-circle-plus text-primary me-2"></i>Post a New Job Listing</h4>

                <!-- Alert Message -->
                <div id="form-alert" class="alert d-none mb-4"></div>

                <!-- Form Card -->
                <div class="card border-0 shadow-sm p-4 p-md-5">
                    <form id="job-form" novalidate>
                        
                        <!-- Job Title -->
                        <div class="mb-3">
                            <label for="job-title-input" class="form-label fw-semibold text-secondary small">Job Title</label>
                            <input type="text" class="form-control" id="job-title-input" required placeholder="e.g. Senior Full Stack Engineer">
                            <div class="invalid-feedback">Job title is required.</div>
                        </div>

                        <div class="row g-3 mb-3">
                            <!-- Category Selector -->
                            <div class="col-md-6">
                                <label for="job-category-select" class="form-label fw-semibold text-secondary small">Category</label>
                                <select class="form-select" id="job-category-select" required>
                                    <option value="">Select Category</option>
                                    <!-- Dynamic options -->
                                </select>
                                <div class="invalid-feedback">Category selection is required.</div>
                            </div>
                            
                            <!-- Job Type -->
                            <div class="col-md-6">
                                <label for="job-type-select" class="form-label fw-semibold text-secondary small">Job Type</label>
                                <select class="form-select" id="job-type-select" required>
                                    <option value="">Select Type</option>
                                    <option value="full-time">Full-Time</option>
                                    <option value="part-time">Part-Time</option>
                                    <option value="contract">Contract</option>
                                    <option value="remote">Remote</option>
                                </select>
                                <div class="invalid-feedback">Job type is required.</div>
                            </div>
                        </div>

                        <div class="row g-3 mb-3">
                            <!-- Location -->
                            <div class="col-md-6">
                                <label for="job-location-input" class="form-label fw-semibold text-secondary small">Location</label>
                                <input type="text" class="form-control" id="job-location-input" required placeholder="e.g. London, Remote (UK)">
                                <div class="invalid-feedback">Location is required.</div>
                            </div>
                            
                            <!-- Salary Range -->
                            <div class="col-md-6">
                                <label for="job-salary-input" class="form-label fw-semibold text-secondary small">Salary Range (Optional)</label>
                                <input type="text" class="form-control" id="job-salary-input" placeholder="e.g. $80k - $100k, Competitive">
                            </div>
                        </div>

                        <!-- Job Description -->
                        <div class="mb-3">
                            <label for="job-description-input" class="form-label fw-semibold text-secondary small">Job Description</label>
                            <textarea class="form-control" id="job-description-input" rows="6" required placeholder="Provide a detailed description of the role, responsibilities, and team layout..."></textarea>
                            <div class="invalid-feedback">Job description is required.</div>
                        </div>

                        <!-- Requirements -->
                        <div class="mb-4">
                            <label for="job-requirements-input" class="form-label fw-semibold text-secondary small">Job Requirements (Optional)</label>
                            <textarea class="form-control" id="job-requirements-input" rows="5" placeholder="Specify technical criteria, experience levels, certifications, or expectations..."></textarea>
                        </div>

                        <!-- Submit Button -->
                        <button type="submit" id="save-job-btn" class="btn btn-primary fw-semibold px-4 py-2">
                            Publish Listing <i class="fa-solid fa-paper-plane ms-1"></i>
                        </button>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Script Logic -->
    <script>
        $(document).ready(function() {
            // Get URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const jobId = parseInt(urlParams.get('id'));
            const isEditMode = !isNaN(jobId);

            // 1. Session Protection Guard
            $.ajax({
                url: '../api/controllers/auth.php?action=me',
                type: 'GET',
                dataType: 'json',
                success: function(response) {
                    if (response.status !== 'success') {
                        window.location.href = '../index.html';
                    } else {
                        const user = response.data;
                        if (user.role !== 'employer') {
                            window.location.href = 'jobs.html';
                            return;
                        }
                        
                        $('#user-name-display').text(user.full_name);
                        
                        // Load Categories options first
                        loadCategories(function() {
                            // If edit mode, load job info next
                            if (isEditMode) {
                                configureEditMode();
                            }
                        });
                    }
                },
                error: function() {
                    window.location.href = '../index.html';
                }
            });

            // 2. Fetch categories list
            function loadCategories(callback) {
                $.ajax({
                    url: '../api/controllers/jobs.php?action=categories',
                    type: 'GET',
                    dataType: 'json',
                    success: function(response) {
                        if (response.status === 'success') {
                            let options = '';
                            response.data.forEach(function(cat) {
                                options += `<option value="${cat.id}">${cat.name}</option>`;
                            });
                            $('#job-category-select').append(options);
                            
                            if (callback) callback();
                        }
                    }
                });
            }

            // 3. Configure Edit Mode details
            function configureEditMode() {
                // Adapt HTML Headers & Nav
                $('#form-title').html('<i class="fa-solid fa-pen-to-square text-primary me-2"></i>Edit Job Listing');
                $('#form-nav-link').text('Edit Job');
                $('#save-job-btn').html('Update Listing <i class="fa-solid fa-arrows-rotate ms-1"></i>');

                // Get existing job record
                $.ajax({
                    url: `../api/controllers/jobs.php?id=${jobId}`,
                    type: 'GET',
                    dataType: 'json',
                    success: function(response) {
                        if (response.status === 'success') {
                            const job = response.data;
                            
                            $('#job-title-input').val(job.title);
                            $('#job-category-select').val(job.category_id);
                            $('#job-type-select').val(job.job_type);
                            $('#job-location-input').val(job.location);
                            $('#job-salary-input').val(job.salary_range || '');
                            $('#job-description-input').val(job.description);
                            $('#job-requirements-input').val(job.requirements || '');
                        } else {
                            alert('Job not found.');
                            window.location.href = 'dashboard-employer.html';
                        }
                    },
                    error: function() {
                        window.location.href = 'dashboard-employer.html';
                    }
                });
            }

            // 4. Form Submit handler (Create vs Update)
            $('#job-form').submit(function(e) {
                e.preventDefault();
                $('#form-alert').addClass('d-none').removeClass('alert-danger alert-success');

                const title = $('#job-title-input').val().trim();
                const categoryId = $('#job-category-select').val();
                const jobType = $('#job-type-select').val();
                const locationInput = $('#job-location-input').val().trim();
                const salary = $('#job-salary-input').val().trim();
                const description = $('#job-description-input').val().trim();
                const requirements = $('#job-requirements-input').val().trim();

                // Client Side Validation Checks
                let isValid = true;
                
                if (title === '') { $('#job-title-input').addClass('is-invalid'); isValid = false; }
                else { $('#job-title-input').removeClass('is-invalid'); }

                if (categoryId === '') { $('#job-category-select').addClass('is-invalid'); isValid = false; }
                else { $('#job-category-select').removeClass('is-invalid'); }

                if (jobType === '') { $('#job-type-select').addClass('is-invalid'); isValid = false; }
                else { $('#job-type-select').removeClass('is-invalid'); }

                if (locationInput === '') { $('#job-location-input').addClass('is-invalid'); isValid = false; }
                else { $('#job-location-input').removeClass('is-invalid'); }

                if (description === '') { $('#job-description-input').addClass('is-invalid'); isValid = false; }
                else { $('#job-description-input').removeClass('is-invalid'); }

                if (!isValid) {
                    $('#form-alert').removeClass('d-none').addClass('alert-danger').text('Please correct form validation errors.');
                    return;
                }

                // Determine URL endpoint path
                let requestUrl = '../api/controllers/jobs.php?action=create';
                if (isEditMode) {
                    requestUrl = `../api/controllers/jobs.php?action=update&id=${jobId}`;
                }

                $('#save-job-btn').prop('disabled', true).html('<i class="fa-solid fa-spinner fa-spin me-1"></i> Saving...');

                $.ajax({
                    url: requestUrl,
                    type: 'POST',
                    data: {
                        title: title,
                        category_id: categoryId,
                        job_type: jobType,
                        location: locationInput,
                        salary_range: salary,
                        description: description,
                        requirements: requirements
                    },
                    dataType: 'json',
                    success: function(response) {
                        $('#save-job-btn').prop('disabled', false).html(isEditMode ? 'Update Listing <i class="fa-solid fa-arrows-rotate ms-1"></i>' : 'Publish Listing <i class="fa-solid fa-paper-plane ms-1"></i>');
                        
                        if (response.status === 'success') {
                            $('#form-alert').removeClass('d-none alert-danger').addClass('alert-success').html('<strong>Success!</strong> ' + response.message);
                            
                            setTimeout(function() {
                                window.location.href = 'dashboard-employer.html';
                            }, 1500);
                        } else {
                            $('#form-alert').removeClass('d-none alert-success').addClass('alert-danger').text(response.message);
                        }
                    },
                    error: function() {
                        $('#save-job-btn').prop('disabled', false).html(isEditMode ? 'Update Listing <i class="fa-solid fa-arrows-rotate ms-1"></i>' : 'Publish Listing <i class="fa-solid fa-paper-plane ms-1"></i>');
                        $('#form-alert').removeClass('d-none').addClass('alert-danger').text('An error occurred on the server. Please check configurations.');
                    }
                });
            });

            // Logout Action
            $('#logout-btn').click(function() {
                $.ajax({
                    url: '../api/controllers/auth.php?action=logout',
                    type: 'POST',
                    dataType: 'json',
                    success: function(response) {
                        window.location.href = '../index.html';
                    }
                });
            });
        });
    </script>
</body>
</html>
